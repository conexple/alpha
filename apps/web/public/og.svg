<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" stitchTiles="stitch" numOctaves="2"/>
      <feColorMatrix values="0 0 0 0 0.06  0 0 0 0 0.07  0 0 0 0 0.08  0 0 0 0.05 0"/>
    </filter>
    <linearGradient id="rightFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#FBF7F1" stop-opacity="0"/>
      <stop offset="1" stop-color="#F4EFE6" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Cream base -->
  <rect width="1200" height="630" fill="#FBF7F1"/>

  <!-- Subtle paper grain -->
  <rect width="1200" height="630" filter="url(#grain)"/>

  <!-- Right-side paper fade behind tree -->
  <rect x="700" y="0" width="500" height="630" fill="url(#rightFade)"/>

  <!-- Top divider line -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#E5DDCD" stroke-width="1"/>

  <!-- Top-left tag -->
  <circle cx="82" cy="48" r="3.5" fill="#5C6B3A"/>
  <text x="96" y="53" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="3" fill="#8B847B">CONEXPLE · ALPHA · SOLANA DEVNET</text>

  <!-- Top-right tag -->
  <text x="1120" y="53" text-anchor="end" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="3" fill="#8B847B">v0.1.0-ALPHA · APACHE 2.0</text>

  <!-- Headline (Fraunces serif with system fallback) -->
  <text x="80" y="232" font-family="Fraunces, Georgia, serif" font-size="76" font-weight="400" fill="#0E1116" letter-spacing="-3">Pay loyal customers,</text>
  <text x="80" y="312" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="76" font-weight="300" fill="#9945FF" letter-spacing="-3">not influencers.</text>

  <!-- Subhead -->
  <text x="80" y="378" font-family="Geist, system-ui, sans-serif" font-size="20" fill="#3B3A36">Open-source consumer affiliate protocol on Solana.</text>
  <text x="80" y="406" font-family="Geist, system-ui, sans-serif" font-size="20" fill="#3B3A36">Every rule, payout, and position lives on chain.</text>

  <!-- Stats row -->
  <g font-family="Fraunces, Georgia, serif">
    <text x="80" y="498" font-size="44" fill="#0E1116" font-weight="400">÷7</text>
    <text x="80" y="528" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="2.5" fill="#8B847B">SLOTS</text>

    <text x="200" y="498" font-size="44" fill="#0E1116" font-weight="400">50%</text>
    <text x="200" y="528" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="2.5" fill="#8B847B">MARGIN CAP</text>

    <text x="360" y="498" font-size="44" fill="#0E1116" font-weight="400">5</text>
    <text x="360" y="528" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="2.5" fill="#8B847B">LEVELS</text>

    <text x="450" y="498" font-size="44" fill="#0E1116" font-weight="400">0</text>
    <text x="450" y="528" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="2.5" fill="#8B847B">RECRUITMENT REQ</text>
  </g>

  <!-- Bottom: wordmark + domain -->
  <text x="80" y="588" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#0E1116" letter-spacing="-0.5">Conexple</text>
  <text x="200" y="588" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#8B847B">conexple-pages-web.pages.dev</text>

  <!-- Right side: stylized network tree -->
  <g transform="translate(820, 130)">
    <!-- bezier edges Root -> L1 -->
    <g stroke="#C7BFAF" stroke-width="1.5" fill="none">
      <path d="M 150 30 C 150 90, 50 100, 50 160"/>
      <path d="M 150 30 C 150 90, 150 100, 150 160"/>
      <path d="M 150 30 C 150 90, 250 100, 250 160"/>
    </g>
    <!-- L1 -> L2 -->
    <g stroke="#C7BFAF" stroke-width="1.5" fill="none">
      <path d="M 50 200 C 50 250, 25 260, 25 310"/>
      <path d="M 50 200 C 50 250, 75 260, 75 310"/>
      <path d="M 150 200 C 150 250, 150 260, 150 310"/>
      <path d="M 250 200 C 250 250, 250 260, 250 310"/>
    </g>

    <!-- Root (ink) -->
    <circle cx="150" cy="6" r="28" fill="#0E1116" stroke="#0E1116" stroke-width="1.5"/>
    <text x="150" y="12" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="16" font-weight="500" fill="#FBF7F1">L0</text>

    <!-- L1 (cream + ink) -->
    <circle cx="50" cy="180" r="24" fill="#FBF7F1" stroke="#0E1116" stroke-width="1.5"/>
    <text x="50" y="186" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#0E1116">L1</text>

    <circle cx="150" cy="180" r="24" fill="#FBF7F1" stroke="#0E1116" stroke-width="1.5"/>
    <text x="150" y="186" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#0E1116">L1</text>

    <!-- L1 highlighted (purple) -->
    <circle cx="250" cy="180" r="24" fill="#9945FF" stroke="#9945FF" stroke-width="1.5"/>
    <text x="250" y="186" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="14" fill="#FBF7F1">L1</text>

    <!-- L2 leaves -->
    <circle cx="25" cy="330" r="20" fill="#FBF7F1" stroke="#0E1116" stroke-width="1.5"/>
    <text x="25" y="336" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="12" fill="#0E1116">L2</text>

    <circle cx="75" cy="330" r="20" fill="#FBF7F1" stroke="#0E1116" stroke-width="1.5"/>
    <text x="75" y="336" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="12" fill="#0E1116">L2</text>

    <circle cx="150" cy="330" r="20" fill="#FBF7F1" stroke="#0E1116" stroke-width="1.5"/>
    <text x="150" y="336" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="12" fill="#0E1116">L2</text>

    <circle cx="250" cy="330" r="20" fill="#FBF7F1" stroke="#0E1116" stroke-width="1.5"/>
    <text x="250" y="336" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="12" fill="#0E1116">L2</text>

    <!-- Earnings tags (olive) -->
    <text x="25" y="370" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" font-weight="500" fill="#5C6B3A">+250</text>
    <text x="75" y="370" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" font-weight="500" fill="#5C6B3A">+180</text>
    <text x="150" y="370" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" font-weight="500" fill="#5C6B3A">+420</text>
    <text x="250" y="370" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" font-weight="500" fill="#5C6B3A">+850</text>

    <!-- Caption -->
    <text x="150" y="420" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="11" letter-spacing="2.5" fill="#8B847B">5-LEVEL UNILEVEL · ON-CHAIN</text>
  </g>
</svg>
